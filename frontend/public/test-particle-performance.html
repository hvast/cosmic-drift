<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Animation Performance Test</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .controls {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    
    .control-group {
      margin-bottom: 15px;
    }
    
    label {
      display: inline-block;
      width: 200px;
      font-weight: bold;
    }
    
    input[type="range"] {
      width: 300px;
      vertical-align: middle;
    }
    
    .value-display {
      display: inline-block;
      width: 80px;
      text-align: right;
      font-weight: bold;
      color: #ffd700;
    }
    
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-right: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 8px rgba(0,0,0,0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .stats {
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    
    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 5px;
    }
    
    .stat-label {
      font-weight: bold;
    }
    
    .stat-value {
      color: #ffd700;
      font-weight: bold;
    }
    
    .stat-value.good {
      color: #4ade80;
    }
    
    .stat-value.warning {
      color: #fbbf24;
    }
    
    .stat-value.bad {
      color: #f87171;
    }
    
    #canvas-container {
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 500px;
    }
    
    canvas {
      border-radius: 10px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌟 Particle Animation Performance Test</h1>
    
    <div class="controls">
      <h2>Controls</h2>
      <div class="control-group">
        <label>Particle Count:</label>
        <input type="range" id="particleCount" min="50" max="1000" value="250" step="50">
        <span class="value-display" id="particleCountValue">250</span>
      </div>
      <div class="control-group">
        <label>Emotion Value:</label>
        <input type="range" id="emotionValue" min="0" max="100" value="50">
        <span class="value-display" id="emotionValueValue">50</span>
      </div>
      <div class="control-group">
        <button id="startBtn">Start Animation</button>
        <button id="stopBtn">Stop Animation</button>
        <button id="resetBtn">Reset Stats</button>
      </div>
    </div>
    
    <div class="stats">
      <h2>Performance Statistics</h2>
      <div class="stat-row">
        <span class="stat-label">Current FPS:</span>
        <span class="stat-value" id="currentFps">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Average FPS:</span>
        <span class="stat-value" id="avgFps">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Min FPS:</span>
        <span class="stat-value" id="minFps">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Max FPS:</span>
        <span class="stat-value" id="maxFps">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Frame Time (ms):</span>
        <span class="stat-value" id="frameTime">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Particle Count:</span>
        <span class="stat-value" id="activeParticles">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Status:</span>
        <span class="stat-value" id="status">Stopped</span>
      </div>
    </div>
    
    <div id="canvas-container"></div>
  </div>
  
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  
  <script type="module">
    import * as THREE from 'three';
    
    // Performance tracking
    let frameCount = 0;
    let lastTime = performance.now();
    let fpsHistory = [];
    let minFps = Infinity;
    let maxFps = 0;
    
    // Three.js objects
    let scene, camera, renderer, particleSystem;
    let animationId = null;
    let isAnimating = false;
    
    // Animation parameters
    let animParams = {
      breatheSpeed: 1.0,
      breatheAmplitude: 0.1,
      flowSpeed: 1.0,
      flowAmplitude: 0.25,
      depthWaveSpeed: 2.0,
      depthWaveAmplitude: 2.0,
      pulsateSpeed: 4.0,
      pulsateAmplitude: 0.35,
    };
    
    // Generate circular contour points
    function generateContourPoints(count) {
      const points = [];
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        points.push({
          x: Math.cos(angle),
          y: Math.sin(angle)
        });
      }
      return points;
    }
    
    // Create particle texture
    function createParticleTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 64;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      
      const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
      gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
      gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.5)');
      gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
      
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 64, 64);
      
      const texture = new THREE.Texture(canvas);
      texture.needsUpdate = true;
      return texture;
    }
    
    // Generate particle colors
    function generateParticleColors(numParticles, baseColor) {
      const colors = new Float32Array(numParticles * 3);
      const baseThreeColor = new THREE.Color(baseColor);
      const hsl = { h: 0, s: 0, l: 0 };
      baseThreeColor.getHSL(hsl);
      
      for (let i = 0; i < numParticles; i++) {
        const t = i / numParticles;
        const hue = (hsl.h + t * 0.1) % 1;
        const saturation = 0.8;
        const lightness = 0.5 + Math.sin(t * Math.PI * 2) * 0.1;
        
        const color = new THREE.Color().setHSL(hue, saturation, lightness);
        colors[i * 3] = color.r;
        colors[i * 3 + 1] = color.g;
        colors[i * 3 + 2] = color.b;
      }
      
      return colors;
    }
    
    // Calculate animation parameters
    function calculateAnimationParams(emotionValue) {
      const t = emotionValue / 100;
      return {
        breatheSpeed: 0.5 + t * 1.5,
        breatheAmplitude: 0.05 + t * 0.15,
        flowSpeed: 0.5 + t * 1.5,
        flowAmplitude: 0.1 + t * 0.4,
        depthWaveSpeed: 1.0 + t * 3.0,
        depthWaveAmplitude: 1.0 + t * 2.0,
        pulsateSpeed: 2.0 + t * 4.0,
        pulsateAmplitude: 0.2 + t * 0.3,
      };
    }
    
    // Initialize scene
    function initScene() {
      const container = document.getElementById('canvas-container');
      
      // Clear existing content
      container.innerHTML = '';
      
      // Create scene
      scene = new THREE.Scene();
      
      // Create camera
      camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
      camera.position.z = 5;
      
      // Create renderer
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(500, 500);
      renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);
      
      // Add ambient light
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);
    }
    
    // Create particle system
    function createParticleSystem(particleCount, color, emotionValue) {
      // Generate contour points
      const contourPoints = generateContourPoints(particleCount);
      
      // Create geometry
      const geometry = new THREE.BufferGeometry();
      
      // Create position array
      const positions = new Float32Array(particleCount * 3);
      for (let i = 0; i < particleCount; i++) {
        positions[i * 3] = contourPoints[i].x * 2;
        positions[i * 3 + 1] = contourPoints[i].y * 2;
        positions[i * 3 + 2] = 0;
      }
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      
      // Create color array
      const colors = generateParticleColors(particleCount, color);
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      
      // Create size array
      const sizes = new Float32Array(particleCount);
      for (let i = 0; i < particleCount; i++) {
        sizes[i] = 0.05 + Math.random() * 0.03;
      }
      geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
      
      // Create material
      const texture = createParticleTexture();
      const material = new THREE.PointsMaterial({
        size: 0.08,
        map: texture,
        vertexColors: true,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      
      // Create particle system
      const particles = new THREE.Points(geometry, material);
      
      // Store original positions and sizes
      particles.userData.originalPositions = new Float32Array(positions);
      particles.userData.originalSizes = new Float32Array(sizes);
      
      return particles;
    }
    
    // Animation loop
    function animate() {
      if (!isAnimating) return;
      
      const currentTime = performance.now();
      const deltaTime = currentTime - lastTime;
      const fps = 1000 / deltaTime;
      
      // Update FPS stats
      frameCount++;
      fpsHistory.push(fps);
      if (fpsHistory.length > 60) fpsHistory.shift();
      
      minFps = Math.min(minFps, fps);
      maxFps = Math.max(maxFps, fps);
      
      const avgFps = fpsHistory.reduce((a, b) => a + b, 0) / fpsHistory.length;
      
      // Update UI
      document.getElementById('currentFps').textContent = fps.toFixed(1);
      document.getElementById('avgFps').textContent = avgFps.toFixed(1);
      document.getElementById('minFps').textContent = minFps.toFixed(1);
      document.getElementById('maxFps').textContent = maxFps.toFixed(1);
      document.getElementById('frameTime').textContent = deltaTime.toFixed(2);
      
      // Color code FPS
      const fpsElement = document.getElementById('currentFps');
      if (fps >= 55) {
        fpsElement.className = 'stat-value good';
      } else if (fps >= 30) {
        fpsElement.className = 'stat-value warning';
      } else {
        fpsElement.className = 'stat-value bad';
      }
      
      // Animate particles
      if (particleSystem) {
        const elapsed = currentTime / 1000;
        const positionAttr = particleSystem.geometry.attributes.position;
        const sizeAttr = particleSystem.geometry.attributes.size;
        const positions = positionAttr.array;
        const sizes = sizeAttr.array;
        const originalPositions = particleSystem.userData.originalPositions;
        const originalSizes = particleSystem.userData.originalSizes;
        
        const numParticles = positions.length / 3;
        
        for (let i = 0; i < numParticles; i++) {
          const i3 = i * 3;
          const t = i / numParticles;
          
          // Breathing effect
          const breathe = 1 + Math.sin(elapsed * animParams.breatheSpeed) * animParams.breatheAmplitude;
          
          // Flow effect
          const flowOffset = (elapsed * animParams.flowSpeed + t) % 1;
          const nextIndex = Math.floor(flowOffset * numParticles);
          const flowX = originalPositions[nextIndex * 3] - originalPositions[i3];
          const flowY = originalPositions[nextIndex * 3 + 1] - originalPositions[i3 + 1];
          
          // Depth wave effect
          const depthWave = Math.sin(elapsed * animParams.depthWaveSpeed + t * Math.PI * 2) * animParams.depthWaveAmplitude;
          
          // Apply effects
          positions[i3] = originalPositions[i3] * breathe + flowX * animParams.flowAmplitude;
          positions[i3 + 1] = originalPositions[i3 + 1] * breathe + flowY * animParams.flowAmplitude;
          positions[i3 + 2] = depthWave;
          
          // Pulsate effect
          const pulsate = 1 + Math.sin(elapsed * animParams.pulsateSpeed + t * Math.PI * 4) * animParams.pulsateAmplitude;
          sizes[i] = originalSizes[i] * pulsate;
        }
        
        positionAttr.needsUpdate = true;
        sizeAttr.needsUpdate = true;
      }
      
      // Render
      renderer.render(scene, camera);
      
      lastTime = currentTime;
      animationId = requestAnimationFrame(animate);
    }
    
    // Start animation
    function startAnimation() {
      if (isAnimating) return;
      
      const particleCount = parseInt(document.getElementById('particleCount').value);
      const emotionValue = parseInt(document.getElementById('emotionValue').value);
      const color = '#667eea';
      
      // Update animation parameters
      animParams = calculateAnimationParams(emotionValue);
      
      // Initialize scene if needed
      if (!scene) {
        initScene();
      }
      
      // Remove old particle system
      if (particleSystem) {
        scene.remove(particleSystem);
        particleSystem.geometry.dispose();
        particleSystem.material.dispose();
      }
      
      // Create new particle system
      particleSystem = createParticleSystem(particleCount, color, emotionValue);
      scene.add(particleSystem);
      
      // Update UI
      document.getElementById('activeParticles').textContent = particleCount;
      document.getElementById('status').textContent = 'Running';
      document.getElementById('status').className = 'stat-value good';
      
      // Start animation
      isAnimating = true;
      lastTime = performance.now();
      animate();
    }
    
    // Stop animation
    function stopAnimation() {
      isAnimating = false;
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
      document.getElementById('status').textContent = 'Stopped';
      document.getElementById('status').className = 'stat-value';
    }
    
    // Reset stats
    function resetStats() {
      frameCount = 0;
      fpsHistory = [];
      minFps = Infinity;
      maxFps = 0;
      lastTime = performance.now();
    }
    
    // Event listeners
    document.getElementById('particleCount').addEventListener('input', (e) => {
      document.getElementById('particleCountValue').textContent = e.target.value;
    });
    
    document.getElementById('emotionValue').addEventListener('input', (e) => {
      document.getElementById('emotionValueValue').textContent = e.target.value;
      if (isAnimating) {
        animParams = calculateAnimationParams(parseInt(e.target.value));
      }
    });
    
    document.getElementById('startBtn').addEventListener('click', startAnimation);
    document.getElementById('stopBtn').addEventListener('click', stopAnimation);
    document.getElementById('resetBtn').addEventListener('click', resetStats);
    
    // Initialize
    initScene();
  </script>
</body>
</html>
